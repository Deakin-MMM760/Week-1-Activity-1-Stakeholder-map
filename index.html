<script>
function exportAsDocHtml(data){
  const esc = (s) => String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");

  const toHtml = (s) => esc(s).replace(/\r?\n/g, "<br>");
  const td = (html) => (html && html.trim().length ? html : "&nbsp;");

  // ✅ Export the FULL template (pad to at least 8 rows)
  const rowsAll = Array.isArray(data.stakeholderRows) ? [...data.stakeholderRows] : [];
  while (rowsAll.length < 8) rowsAll.push({ stakeholder:"", wants:"", tension:"" });

  const dateText = data.meta.workDate || new Date().toISOString().slice(0,10);
  const title = "MMM760 • Week 1 • Template 1 — Stakeholder map (draft)";

  const rowHtml = rowsAll.map(r => `
    <tr>
      <td>${td(toHtml(r.stakeholder))}</td>
      <td>${td(toHtml(r.wants))}</td>
      <td>${td(toHtml(r.tension))}</td>
    </tr>
  `).join("");

  const html =
`<!doctype html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
  <meta charset="utf-8">
  <title>${esc(title)}</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif; font-size:11pt; color:#1f2a30;}
    h1{color:#007A78; font-size:18pt; margin:0 0 8pt 0;}
    h2{font-size:13pt; margin:14pt 0 6pt 0;}
    p{margin:0 0 8pt 0;}
    .subtle{color:#5b6b75; font-style:italic;}
    table{width:100%; border-collapse:collapse; margin:6pt 0 10pt 0;}
    th{background:#007A78; color:#fff; text-align:left; padding:6pt; font-weight:bold;}
    td{border:1px solid #d6e1e5; padding:6pt; vertical-align:top; height:28pt;}
    .label{background:#007A78; color:#fff; font-weight:bold; width:22%;}
  </style>
</head>
<body>
  <h1>${esc(title)}</h1>
  <p class="subtle">Keep it short but real. A draft is enough.</p>

  <h2>Business context</h2>
  <table>
    <tr><td class="label">Student name</td><td>${td(toHtml(data.meta.studentName || ""))}</td><td class="label">Date</td><td>${esc(dateText)}</td></tr>
    <tr><td class="label">Business name</td><td>${td(toHtml(data.business.name || ""))}</td><td class="label">Who it serves</td><td>${td(toHtml(data.business.serves || ""))}</td></tr>
    <tr><td class="label">What it sells (1 sentence)</td><td colspan="3">${td(toHtml(data.business.sells || ""))}</td></tr>
  </table>

  <h2>Stakeholder map</h2>
  <table>
    <tr>
      <th>Stakeholder</th>
      <th>What they want / care about</th>
      <th>One tension / risk / trade-off</th>
    </tr>
    ${rowHtml}
  </table>

  <h2>My key tension to discuss in seminar</h2>
  <p>${td(toHtml(data.keyTension || ""))}</p>

  <h2>One question for seminar (optional)</h2>
  <p>${td(toHtml(data.seminarQuestion || ""))}</p>

  <p class="subtle" style="text-align:center; margin-top:14pt;">Generated from MMM760 Week 1 worksheet</p>
</body>
</html>`;

  const blob = new Blob(["\ufeff", html], { type: "application/msword" });
  const safeBiz = (data.business.name || "Business").replace(/[^\w\-]+/g,"_").slice(0,40);
  downloadBlob(blob, `MMM760_W1_Template1_StakeholderMap_${safeBiz}.doc`);
}
</script>
